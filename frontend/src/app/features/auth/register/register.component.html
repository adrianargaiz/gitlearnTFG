<div class="min-h-screen flex items-center justify-center px-5 py-8" style="background:var(--bg)">
  <div class="w-full" style="max-width:440px">

    <!-- Logo + title (outside card) -->
    <div style="text-align:center;margin-bottom:32px">
      <img src="logoGitLearn.png" alt="GitLearn" style="width:64px;height:64px;object-fit:contain;margin:0 auto 14px;display:block">
      <h1 style="font-size:24px;font-weight:800;letter-spacing:-0.02em;color:var(--text)">Crea tu cuenta</h1>
      <p style="color:var(--muted);margin-top:6px;font-size:14px">Empieza a aprender Git gratis hoy</p>
    </div>

    <div class="gl-card">

      <!-- GitHub OAuth -->
      <button type="button" (click)="loginWithGitHub()"
        class="gl-btn gl-btn-md gl-btn-secondary w-full" style="margin-bottom:20px;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Registrarse con GitHub
      </button>

      <!-- Divider -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <div class="gl-divider" style="flex:1"></div>
        <span style="font-size:12px;color:var(--muted);font-weight:600">O con email</span>
        <div class="gl-divider" style="flex:1"></div>
      </div>

      <!-- Error message -->
      @if (errorMsg()) {
        <div class="gl-alert gl-alert-error mb-4" role="alert">{{ errorMsg() }}</div>
      }

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate style="display:flex;flex-direction:column;gap:16px">
        <div>
          <label for="nombre" class="gl-label">Nombre completo</label>
          <input id="nombre" type="text" formControlName="nombre" autocomplete="name"
            placeholder="Tu nombre" class="gl-input"
            [class.error]="form.controls.nombre.invalid && form.controls.nombre.touched"/>
        </div>

        <div>
          <label for="email" class="gl-label">Email</label>
          <input id="email" type="email" formControlName="email" autocomplete="email"
            placeholder="tu@email.com" class="gl-input"
            [class.error]="form.controls.email.invalid && form.controls.email.touched"/>
        </div>

        <div>
          <label for="reg-password" class="gl-label">Contraseña</label>
          <div class="relative">
            <input id="reg-password" [type]="showPassword() ? 'text' : 'password'"
              formControlName="password" autocomplete="new-password"
              placeholder="Mínimo 6 caracteres" class="gl-input" style="padding-right:2.5rem"
              [class.error]="form.controls.password.invalid && form.controls.password.touched"/>
            <button type="button" (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 transition-colors"
              style="color:var(--muted)" tabindex="-1" aria-label="Mostrar u ocultar contraseña">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Role selector -->
        <div>
          <label class="gl-label">Soy...</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            @for (r of roles; track r.value) {
              <button type="button" (click)="setRol(r.value)"
                style="border-radius:var(--r-lg);padding:14px 12px;cursor:pointer;text-align:center;transition:all 0.15s;border:2px solid"
                [style.background]="form.controls.rol.value === r.value ? 'var(--green-bg)' : 'var(--surface2)'"
                [style.border-color]="form.controls.rol.value === r.value ? 'var(--green)' : 'var(--border)'">
                @if (r.value === 'estudiante') {
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                       style="display:block;margin:0 auto 8px"
                       [style.color]="form.controls.rol.value === 'estudiante' ? 'var(--green)' : 'var(--muted)'"
                       aria-hidden="true">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
                  </svg>
                } @else {
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                       style="display:block;margin:0 auto 8px"
                       [style.color]="form.controls.rol.value === 'profesor' ? 'var(--green)' : 'var(--muted)'"
                       aria-hidden="true">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                  </svg>
                }
                <div style="font-size:14px;font-weight:700"
                     [style.color]="form.controls.rol.value === r.value ? 'var(--text)' : 'var(--text2)'">{{ r.label }}</div>
                <div style="font-size:12px;color:var(--muted);margin-top:2px">{{ r.desc }}</div>
              </button>
            }
          </div>
        </div>

        <button type="submit" [disabled]="loading()"
          class="gl-btn gl-btn-md gl-btn-primary w-full" style="margin-top:4px;justify-content:center">
          @if (loading()) {
            <span class="w-4 h-4 rounded-full animate-spin" style="border:2px solid #0a1a00;border-top-color:transparent"></span>
            Creando cuenta...
          } @else {
            Crear cuenta gratis
          }
        </button>
      </form>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
      ¿Ya tienes cuenta?
      <a routerLink="/login" style="color:var(--green);font-weight:600;text-decoration:none">Iniciar sesión</a>
    </p>
  </div>
</div>
